<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<title>BLOW 沖縄国際通り店 ブログ</title>
<meta name="description" content="BLOW 沖縄国際通り店 からのお知らせ・最新情報">
<meta http-equiv="content-language" content="ja">
<meta property="og:type" content="article">
<meta property="og:site_name" content="BLOW 沖縄国際通り店">
<meta property="og:locale" content="ja_JP">
<meta property="og:image" content="https://blow-kokusaidori.search-mania.net/ogp.svg">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0d0d0d;
  color:#F6F1EB;
  font-family:'Noto Serif JP','Hiragino Mincho ProN',serif;
  line-height:1.9;
  -webkit-font-smoothing:antialiased;
}
header{
  background:#0d0d0d;
  padding:18px 24px;
  text-align:center;
  border-bottom:1px solid rgba(201,168,76,.12);
  position:sticky;top:0;z-index:10;
  backdrop-filter:blur(10px);
}
header a{
  color:#F6F1EB;
  text-decoration:none;
  font-size:17px;
  letter-spacing:.36em;
  font-family:'Noto Serif JP',serif;
  font-weight:400;
  transition:color .3s ease;
}
header a:hover{color:#C9A84C}
.wrap{
  max-width:720px;
  margin:60px auto;
  padding:0 24px 80px;
}
.loading{
  text-align:center;padding:120px 0;
  color:rgba(246,241,235,.4);font-size:13px;letter-spacing:.2em;
}
.loading::after{
  content:'読 み 込 み 中 …';
  display:block;animation:fade 1.4s ease-in-out infinite;
}
@keyframes fade{0%,100%{opacity:.4}50%{opacity:1}}

.card{
  background:#161616;
  border:1px solid rgba(201,168,76,.10);
  overflow:hidden;
}
.card img{
  width:100%;
  display:block;
  max-height:480px;
  object-fit:cover;
}
.card-body{padding:36px 38px 44px}
.card .date{
  font-size:11px;
  color:#C9A84C;
  letter-spacing:.24em;
  font-family:'Noto Serif JP',serif;
  display:block;
  margin-bottom:10px;
}
.card h1{
  margin:0 0 28px;
  font-size:22px;
  line-height:1.7;
  font-weight:500;
  font-family:'Noto Serif JP',serif;
  color:#F6F1EB;
  letter-spacing:.04em;
}
.card .text{
  font-size:15px;
  line-height:2.1;
  white-space:pre-wrap;
  color:rgba(246,241,235,.65);
  word-break:break-word;
}
.back-wrap{margin-top:52px;text-align:center}
.back-btn{
  display:inline-block;
  padding:14px 36px;
  border:1px solid #F6F1EB;
  color:#F6F1EB;
  text-decoration:none;
  font-size:12px;
  letter-spacing:.24em;
  font-family:'Noto Serif JP',serif;
  transition:all .35s ease;
}
.back-btn:hover{background:#F6F1EB;color:#0d0d0d}
.not-found{
  text-align:center;padding:90px 24px;
  font-family:'Noto Serif JP',serif;
}
.not-found h1{font-size:24px;margin-bottom:18px;color:#F6F1EB}
.not-found p{font-size:14px;color:rgba(246,241,235,.5);margin-bottom:36px;line-height:1.9}
.produced-by{
  text-align:center;margin-top:64px;
  font-size:10px;letter-spacing:.28em;
  color:rgba(246,241,235,.18);text-transform:uppercase;
  font-family:'Noto Serif JP',serif;
}
.produced-by a{color:rgba(201,168,76,.35);text-decoration:none;transition:color .3s ease}
.produced-by a:hover{color:#C9A84C}
@media (max-width:600px){
  .wrap{margin:30px auto;padding:0 16px 60px}
  .card-body{padding:26px 22px 32px}
  .card h1{font-size:19px;margin-bottom:22px}
  .card .text{font-size:14.5px;line-height:1.95}
  header a{font-size:14px;letter-spacing:.28em}
  .back-btn{padding:13px 28px;font-size:11px}
}
</style>
</head>
<body>
<header><a href="https://blow-kokusaidori.search-mania.net/">BLOW 沖縄国際通り店</a></header>
<div class="wrap" id="root">
  <div class="loading"></div>
</div>
<script>
const GAS_URL    = 'https://script.google.com/macros/s/AKfycbxNbYcMyicthfOx-25Ir2szSp3EDa1rAGNjHrFwxDFSFzww9cfnHcEy_D5IjKiqW2Nq/exec';
const SITE_URL   = 'https://blow-kokusaidori.search-mania.net';
const STORE_NAME = 'BLOW 沖縄国際通り店';

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(s) {
  if (!s) return '';
  const m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? m[1] + '.' + m[2] + '.' + m[3] : String(s);
}
function driveImg(url) {
  if (!url) return '';
  const s = String(url).trim();
  const m1 = s.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m1) return 'https://drive.google.com/thumbnail?id=' + m1[1] + '&sz=w1200';
  const m2 = s.match(/lh3\.googleusercontent\.com\/d\/([a-zA-Z0-9_-]+)/);
  if (m2) return 'https://lh3.googleusercontent.com/d/' + m2[1] + '=w1200';
  if (s.indexOf('drive.google.com/thumbnail') !== -1) return s.replace(/[?&]sz=[^&]*/, '?sz=w1200');
  return s;
}
function getSlug() {
  // Query param: /blog/?post=SLUG (Cloudflare Pages static file serving)
  const params = new URLSearchParams(location.search);
  if (params.get('post')) return params.get('post');
  // Fallback: path-based /blog/SLUG/ (via _redirects rewrite)
  const m = location.pathname.match(/\/blog\/([^\/]+)\/?$/);
  return m ? m[1] : '';
}
function findBySlug(items, slug) {
  if (!Array.isArray(items) || !slug) return null;
  return items.find(function(b) {
    if (!b || !b.url) return false;
    return b.url.indexOf('/blog/' + slug + '/') !== -1 || b.url.indexOf('/blog/' + slug) !== -1;
  }) || null;
}
function updateMeta(title, desc, imgUrl) {
  document.title = title + ' | ' + STORE_NAME;
  const m1 = document.querySelector('meta[name="description"]');
  if (m1) m1.setAttribute('content', desc);
  function upsertMeta(attrName, attrValue, contentValue) {
    let el = document.querySelector('meta[' + attrName + '="' + attrValue + '"]');
    if (!el) { el = document.createElement('meta'); el.setAttribute(attrName, attrValue); document.head.appendChild(el); }
    el.setAttribute('content', contentValue);
  }
  upsertMeta('property','og:title',title);
  upsertMeta('property','og:description',desc);
  upsertMeta('property','og:url',SITE_URL + location.pathname + location.search);
  upsertMeta('name','twitter:title',title);
  upsertMeta('name','twitter:description',desc);
  if (imgUrl) { upsertMeta('property','og:image',imgUrl); upsertMeta('name','twitter:image',imgUrl); }
  let canonical = document.querySelector('link[rel="canonical"]');
  if (!canonical) { canonical = document.createElement('link'); canonical.setAttribute('rel','canonical'); document.head.appendChild(canonical); }
  canonical.setAttribute('href', SITE_URL + location.pathname + location.search);
}
function render(item) {
  const root = document.getElementById('root');
  if (!item) {
    root.innerHTML = '<div class="not-found"><h1>記事が見つかりません</h1><p>指定された記事は削除されたか、URLが正しくない可能性があります。</p><a class="back-btn" href="' + esc(SITE_URL) + '/">← トップへ戻る</a></div>';
    document.title = '記事が見つかりません | ' + STORE_NAME;
    return;
  }
  const imgUrl = driveImg(item.image);
  let title = (item.title || '').trim();
  if (!title && item.body) title = String(item.body).split(/[。\n]/)[0].trim();
  if (!title && item.date) title = fmtDate(item.date) + ' の投稿';
  const desc = (item.body || title).slice(0, 120);
  updateMeta(title, desc, imgUrl);
  // BlogPosting 構造化データ（Googleがクロール時にJSを実行した際に認識される）
  (function() {
    var existing = document.getElementById('blog-jsonld');
    if (existing) existing.remove();
    var sd = document.createElement('script');
    sd.id = 'blog-jsonld';
    sd.type = 'application/ld+json';
    sd.textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@type": "BlogPosting",
      "headline": title,
      "description": desc,
      "datePublished": item.date || '',
      "image": imgUrl || '',
      "url": SITE_URL + location.pathname + location.search,
      "publisher": {
        "@type": "Organization",
        "name": STORE_NAME,
        "url": SITE_URL
      }
    });
    document.head.appendChild(sd);
  })();
  root.innerHTML =
    '<article class="card">' +
      (imgUrl ? '<img src="' + esc(imgUrl) + '" alt="' + esc(title) + '" loading="eager">' : '') +
      '<div class="card-body">' +
        (item.date ? '<span class="date">' + esc(fmtDate(item.date)) + '</span>' : '') +
        (item.title && item.title.trim() ? '<h1>' + esc(item.title) + '</h1>' : '') +
        '<p class="text">' + esc(item.body || '') + '</p>' +
      '</div>' +
    '</article>' +
    '<div class="back-wrap"><a class="back-btn" href="' + esc(SITE_URL) + '/">← トップへ戻る</a></div>' +
    '<div class="produced-by">Produced by <a href="https://search-mania.net/" target="_blank" rel="noopener noreferrer">SearchMania Inc.</a></div>';
}
(function init() {
  const slug = getSlug();
  if (!slug) { render(null); return; }
  fetch(GAS_URL + (GAS_URL.indexOf('?') >= 0 ? '&' : '?') + 'blog_all=1')
    .then(function(r) { return r.json(); })
    .then(function(data) { render(findBySlug(data && data.blog, slug)); })
    .catch(function() {
      fetch(GAS_URL)
        .then(function(r) { return r.json(); })
        .then(function(data) { render(findBySlug(data && data.blog, slug)); })
        .catch(function() { render(null); });
    });
})();
</script>
</body>
</html>
