name: Deploy to Netlify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Netlify
        env:
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          # ↓ Netlify のサイトIDをここに貼り付け（Site configuration で確認）
          NETLIFY_SITE_ID: <NETLIFY_SITE_ID をここに>
        run: |
          # ⚠️ 重要: 全ファイルをZIP化する（blog/ サブディレクトリも含む）
          # 固定リスト指定だと Make が後から作成したブログページがデプロイされず 404 になる
          zip -r deploy.zip . \
            -x ".git/*" -x ".github/*"
          curl -s -X POST \
            -H "Authorization: Bearer $NETLIFY_TOKEN" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/deploys" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Deploy:', d.get('state','?'), d.get('id',''))"
